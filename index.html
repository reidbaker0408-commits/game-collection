<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Your Favorite Games!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      background-color: #333;
      color: white;
      padding: 20px;
      width: 100%;
      text-align: center;
    }
    .game-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .game-item {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 480px;
      height: 320px;
      margin: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Enjoy These Awesome Games!</h1>

  <div class="game-list">
    <div class="game-item">
      <h3>Bit Planes</h3>
      <iframe src="https://bitplanes.com/" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>Get Yoked</h3>
      <iframe src="https://www.getyoked.com/" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>Escape Road 2</h3>
      <iframe src="https://www.crazygames.com/game/escape-road-2" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>Granny</h3>
      <iframe src="https://www.crazygames.com/game/granny" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>Drive Mad</h3>
      <iframe src="https://www.crazygames.com/game/drive-mad" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>Five Nights at Epsteins</h3>
      <iframe src="https://www.crazygames.com/game/five-nights-at-epsteins" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>0v0</h3>
      <iframe src="https://www.crazygames.com/game/0v0" allowfullscreen></iframe>
    </div>
    <div class="game-item">
      <h3>Moto X3M</h3>
      <iframe src="https://www.crazygames.com/game/moto-x3m" allowfullscreen></iframe>
    </div>
  </div>

</body>
</html>
